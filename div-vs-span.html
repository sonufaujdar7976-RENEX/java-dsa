<!-- 
DIV v/s SPAN ELEMENT (CLASS 3)
Div Element - Div is a container used to hold other HTML elements or group it. It is a block element.
Span Element - It is an inline container used to group elements without starting a new line.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div and Span</title>
</head>
<body>
    <div>
        <a href="https://google.com" target="_blank"> google </a>
        <a href="https://facebook.com" target="_blank"> facebook</a>
    </div>

    <a href="https://youtube.com" target="_blank"> youtube</a>

    <hr>

    <span>
        <a href="https://google.com" target="_blank"> google </a>
        <a href="https://facebook.com" target="_blank"> facebook</a>
    </span>

    <a href="https://youtube.com" target="_blank"> youtube</a>
</body>
</html>
