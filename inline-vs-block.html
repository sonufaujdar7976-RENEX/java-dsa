<!--
INLINE v/s BLOCK ELEMENTS CONCEPT
Inline - Take only necessary width. Don't start from new line. Ex: <a>, <img>
Block Element - Takes up the full-width available. Start from new line. Ex: h1 to h6, <p>

💡 CYCLE STAND WALA EXAMPLE:
Ye aese elements hote h jo puri line ko cover kar lete h.
Jese 1-line me 15 cycle stand h aur 1 cycle ne puri jagah gher li h aur dusri cycle ke liye hame new line me cycle park karni hogi.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline vs Block</title>
</head>
<body>
    <h1> Hello World </h1>
    <p> I'm Sonu Faujdar </p>
    <a href="https://gstatic.com" target="_blank"> Sonu </a>
    <a href="https://google.com" target="_blank"> Sonu </a>
    <img src="https://pinimg.com" alt="Sonu" height="600" width="400">
    <img src="https://gstatic.com" alt="jaat" height="600" width="400">
    
    <h2>Jaat Family</h2>
    <img src="FAMILY.jpeg" alt="Family" height="500" width="500">
    <ol type="A">
        <li><b>Grandfather:</b>Mr. Beni Singh</li>
        <li><b>Father:</b>Mr. Charan Singh</li>
        <li><b>Mother:</b>Mrs.Suman Devi</li>
        <li><b>Sons:</b> Sonu , Monu</li>
    </ol>
</body>
</html>
