<!-- 
SUBSCRIPT & SUPERSCRIPT PRACTICE
Sub - Subscript niche square value dene ke liye (Ex: Chemistry formulas)
Super - Super script UPAR SQUARE value dene ke liye (Ex: Math formulas)
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscript and Superscript</title>
</head>
<body>
    <h1>a<sup>2</sup></h1>
    <h1>H<sub>2</sub>O</h1>

    <hr>

    <h1>Pythagoras theorem says: a<sup>2</sup>+b<sup>2</sup> = c<sup>2</sup></h1>
    <h1>Pythagoras theorem says: a<sub>2</sub>+b<sub>2</sub> = c<sub>2</sub> </h1>
</body>
</html>
